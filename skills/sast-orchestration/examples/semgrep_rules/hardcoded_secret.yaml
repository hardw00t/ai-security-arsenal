rules:
  # ---- AWS access keys (high-confidence regex) ----
  - id: aws-access-key-id
    languages: [generic]
    severity: ERROR
    message: AWS Access Key ID detected
    metadata:
      cwe: "CWE-798"
      owasp: "A07:2021 - Identification and Authentication Failures"
      confidence: HIGH
    pattern-regex: '\bAKIA[0-9A-Z]{16}\b'
    paths:
      exclude:
        - "**/*.md"
        - "**/tests/fixtures/**"
        - "**/*.example.*"

  - id: aws-secret-access-key
    languages: [generic]
    severity: ERROR
    message: AWS Secret Access Key detected
    metadata:
      cwe: "CWE-798"
    pattern-regex: '(?i)aws(.{0,20})?(secret|access)(.{0,20})?[''"][0-9a-zA-Z/+]{40}[''"]'

  # ---- GitHub PAT ----
  - id: github-pat
    languages: [generic]
    severity: ERROR
    message: GitHub Personal Access Token detected
    metadata:
      cwe: "CWE-798"
    pattern-regex: '\bghp_[0-9A-Za-z]{36}\b'

  - id: github-fine-grained-pat
    languages: [generic]
    severity: ERROR
    message: GitHub fine-grained PAT detected
    metadata:
      cwe: "CWE-798"
    pattern-regex: '\bgithub_pat_[0-9A-Za-z_]{82}\b'

  # ---- Slack webhook / token ----
  - id: slack-webhook
    languages: [generic]
    severity: ERROR
    message: Slack webhook URL detected
    metadata:
      cwe: "CWE-798"
    pattern-regex: 'https://hooks\.slack\.com/services/T[0-9A-Za-z]+/B[0-9A-Za-z]+/[0-9A-Za-z]+'

  - id: slack-bot-token
    languages: [generic]
    severity: ERROR
    pattern-regex: '\bxox[baprs]-[0-9a-zA-Z]{10,48}\b'
    message: Slack API token detected
    metadata:
      cwe: "CWE-798"

  # ---- Generic hardcoded password in code (Python) ----
  - id: python-hardcoded-password
    languages: [python]
    severity: ERROR
    message: Hardcoded password in source
    metadata:
      cwe: "CWE-798"
      confidence: MEDIUM
    patterns:
      - pattern-either:
          - pattern: password = "..."
          - pattern: passwd = "..."
          - pattern: api_key = "..."
          - pattern: secret = "..."
          - pattern: token = "..."
      - metavariable-regex:
          metavariable: $X
          regex: '^.{6,}$'   # not ""
      - pattern-not: password = ""
      - pattern-not: password = os.environ[...]
      - pattern-not: password = os.getenv(...)
    paths:
      exclude:
        - "**/tests/**"
        - "**/*.example.*"

  # ---- Hardcoded private key (generic) ----
  - id: hardcoded-private-key
    languages: [generic]
    severity: ERROR
    message: Private key embedded in source
    metadata:
      cwe: "CWE-798"
    pattern-regex: '-----BEGIN (RSA|DSA|EC|OPENSSH|PGP) PRIVATE KEY-----'
    paths:
      exclude:
        - "**/tests/fixtures/**"

  # ---- JWT with weak/hardcoded secret ----
  - id: jwt-weak-secret
    languages: [python]
    severity: WARNING
    message: JWT secret looks weak; use a high-entropy env-provided secret
    metadata:
      cwe: "CWE-330"
    patterns:
      - pattern: jwt.encode(..., $SECRET, ...)
      - metavariable-regex:
          metavariable: $SECRET
          regex: '^".{1,20}"$'

  # ---- Google API key ----
  - id: google-api-key
    languages: [generic]
    severity: ERROR
    message: Google API Key detected
    pattern-regex: '\bAIza[0-9A-Za-z\-_]{35}\b'
    metadata:
      cwe: "CWE-798"

  # ---- Stripe keys ----
  - id: stripe-secret-key
    languages: [generic]
    severity: ERROR
    message: Stripe secret key detected
    pattern-regex: '\b(sk|rk)_live_[0-9a-zA-Z]{24,}\b'
    metadata:
      cwe: "CWE-798"
