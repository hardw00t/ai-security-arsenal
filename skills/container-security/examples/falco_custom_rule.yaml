# Falco custom rule pack — load via /etc/falco/rules.d/custom_rules.yaml
# Validated against Falco 0.38+ (2026-04).

- list: allowed_shells
  items: [bash, sh, zsh, ksh, csh, dash, ash]

- list: sensitive_files
  items:
    - /etc/shadow
    - /etc/passwd
    - /etc/kubernetes/admin.conf
    - /etc/kubernetes/pki
    - /root/.kube/config
    - /var/lib/kubelet/pki
    - /var/run/secrets/kubernetes.io/serviceaccount/token

- list: escape_primitive_paths
  items:
    - /proc/1/root
    - /proc/sys/kernel/core_pattern
    - /proc/sys/kernel/modprobe
    - /sys/kernel/uevent_helper

- macro: in_container
  condition: container.id != host

- rule: Shell Spawned in Container
  desc: Interactive shell inside a running container (rare in prod workloads)
  condition: >
    spawned_process and in_container and proc.name in (allowed_shells)
    and not proc.pname in (runc, containerd-shim, crio)
  output: >
    Shell spawned in container
    (user=%user.name cmd=%proc.cmdline pod=%k8s.pod.name ns=%k8s.ns.name
     image=%container.image.repository:%container.image.tag)
  priority: WARNING
  tags: [container, shell, mitre_execution]

- rule: Sensitive File Accessed
  desc: Read of a credential/config file from within a container
  condition: >
    open_read and in_container and fd.name pmatch (sensitive_files)
  output: >
    Sensitive file read in container
    (user=%user.name file=%fd.name cmd=%proc.cmdline
     pod=%k8s.pod.name ns=%k8s.ns.name)
  priority: CRITICAL
  tags: [container, filesystem, mitre_credential_access]

- rule: Container Escape Primitive
  desc: Access to kernel escape primitives or host PID 1 root
  condition: >
    in_container and (
      (evt.type in (ptrace, process_vm_readv, process_vm_writev)) or
      (open_read and fd.name pmatch (escape_primitive_paths)) or
      (open_write and fd.name pmatch (escape_primitive_paths))
    )
  output: >
    Potential container escape primitive used
    (cmd=%proc.cmdline target=%fd.name evt=%evt.type
     pod=%k8s.pod.name ns=%k8s.ns.name)
  priority: CRITICAL
  tags: [container, escape, mitre_privilege_escalation]

- rule: Mount Syscall in Container
  desc: Container attempting to mount a filesystem (CAP_SYS_ADMIN indicator)
  condition: >
    evt.type = mount and in_container and evt.dir = <
  output: >
    Mount syscall in container
    (cmd=%proc.cmdline args=%proc.args pod=%k8s.pod.name ns=%k8s.ns.name)
  priority: CRITICAL
  tags: [container, escape, capability]

- rule: Outbound to Metadata Service
  desc: Container reached cloud instance metadata endpoint
  condition: >
    outbound and in_container and
    fd.sip in ("169.254.169.254", "fd00:ec2::254")
  output: >
    Container reached cloud metadata service
    (pod=%k8s.pod.name ns=%k8s.ns.name dest=%fd.sip:%fd.sport
     cmd=%proc.cmdline)
  priority: WARNING
  tags: [container, cloud, ssrf]

- rule: Write Below Etc
  desc: Unexpected write to /etc inside a running container
  condition: >
    open_write and in_container and fd.name startswith /etc
    and not proc.name in (apt, dpkg, rpm, dnf, yum, apk)
  output: >
    Write to /etc in container
    (file=%fd.name cmd=%proc.cmdline pod=%k8s.pod.name ns=%k8s.ns.name)
  priority: WARNING
  tags: [container, filesystem, mitre_persistence]

- rule: Kernel Module Load
  desc: init_module/finit_module from any container
  condition: evt.type in (init_module, finit_module) and in_container
  output: >
    Kernel module load from container
    (cmd=%proc.cmdline pod=%k8s.pod.name ns=%k8s.ns.name)
  priority: CRITICAL
  tags: [container, kernel, mitre_privilege_escalation]
